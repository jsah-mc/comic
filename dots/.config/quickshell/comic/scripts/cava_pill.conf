[general]
bars = 6
framerate = 24
autosens = 1
sensitivity = 100

[input]
method = pipewire
source = auto
channels = stereo

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
noise_reduction = 70
monstercat = 1
waves = 0
